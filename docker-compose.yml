services:
  postgres:
    image: postgres:16-alpine
    container_name: social_scheduler_postgres
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: social_scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d social_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: social_scheduler_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: social_scheduler_api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://app:app@postgres:5432/social_scheduler?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      API_PORT: 4000
      API_PUBLIC_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:3000
      WEB_APP_URL: http://localhost:3000
      TOKEN_ENCRYPTION_KEY: dev-token-encryption-key-change-me
      X_CLIENT_ID: ""
      X_CLIENT_SECRET: ""
      FACEBOOK_CLIENT_ID: ""
      FACEBOOK_CLIENT_SECRET: ""
      INSTAGRAM_CLIENT_ID: ""
      INSTAGRAM_CLIENT_SECRET: ""
      LINKEDIN_CLIENT_ID: ""
      LINKEDIN_CLIENT_SECRET: ""
      YOUTUBE_CLIENT_ID: ""
      YOUTUBE_CLIENT_SECRET: ""
      TIKTOK_CLIENT_ID: ""
      TIKTOK_CLIENT_SECRET: ""
      PINTEREST_CLIENT_ID: ""
      PINTEREST_CLIENT_SECRET: ""
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: social_scheduler_worker
    command: ["node", "dist/worker.js"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://app:app@postgres:5432/social_scheduler?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-me
      JWT_EXPIRES_IN: 7d
      API_PORT: 4000
      API_PUBLIC_URL: http://localhost:4000
      CORS_ORIGIN: http://localhost:3000
      WEB_APP_URL: http://localhost:3000
      TOKEN_ENCRYPTION_KEY: dev-token-encryption-key-change-me
      X_CLIENT_ID: ""
      X_CLIENT_SECRET: ""
      FACEBOOK_CLIENT_ID: ""
      FACEBOOK_CLIENT_SECRET: ""
      INSTAGRAM_CLIENT_ID: ""
      INSTAGRAM_CLIENT_SECRET: ""
      LINKEDIN_CLIENT_ID: ""
      LINKEDIN_CLIENT_SECRET: ""
      YOUTUBE_CLIENT_ID: ""
      YOUTUBE_CLIENT_SECRET: ""
      TIKTOK_CLIENT_ID: ""
      TIKTOK_CLIENT_SECRET: ""
      PINTEREST_CLIENT_ID: ""
      PINTEREST_CLIENT_SECRET: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    container_name: social_scheduler_web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
